<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    height: 100vh;
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 40px 24px 24px 24px;
  }
  .circle {
    width: 72vw;
    height: 72vw;
    max-width: 320px;
    max-height: 320px;
    border-radius: 50%;
    background: #000;
    border: 6px solid #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .speed {
    font-size: 24vw;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }
  .unit {
    font-size: 4.5vw;
    color: #888;
    letter-spacing: 4px;
    margin-top: 4px;
  }
  #pipBtn {
    margin-top: 32px;
    padding: 16px 36px;
    background: transparent;
    border: 2px solid #fff;
    border-radius: 50px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }
  #status {
    margin-top: 16px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
  /* Video must be visible on iOS for PiP to work - make it tiny */
  #video {
    position: fixed;
    bottom: 0; right: 0;
    width: 2px; height: 2px;
    opacity: 0.01;
  }
  #canvas { display: none; }
</style>
</head>
<body>
  <div class="circle">
    <div class="speed" id="spd">0</div>
    <div class="unit">km/h</div>
  </div>
  <button id="pipBtn">STEP 1: START VIDEO</button>
  <div id="status">Tap the button to begin.</div>

  <canvas id="canvas" width="400" height="400"></canvas>
  <video id="video" playsinline muted></video>

<script>
  const spdEl  = document.getElementById('spd');
  const status = document.getElementById('status');
  const pipBtn = document.getElementById('pipBtn');
  const canvas = document.getElementById('canvas');
  const video  = document.getElementById('video');
  const ctx    = canvas.getContext('2d');
  let kmh = 0;
  let videoReady = false;

  // GPS
  navigator.geolocation.watchPosition(
    function(p) {
      kmh = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
      spdEl.textContent = kmh;
    },
    function() {},
    { enableHighAccuracy: true, maximumAge: 1000 }
  );

  // Draw speed into canvas
  function draw() {
    var W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.beginPath();
    ctx.arc(W/2, H/2, W/2 - 10, 0, Math.PI * 2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 12;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 180px -apple-system, Helvetica Neue, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(kmh, W/2, H/2 - 20);
    ctx.fillStyle = '#888';
    ctx.font = '300 40px -apple-system, Helvetica Neue, sans-serif';
    ctx.fillText('km/h', W/2, H/2 + 110);
  }

  setInterval(draw, 500);
  draw();

  // Step 1: user tap starts the video (required by iOS before PiP)
  // Step 2: second tap requests PiP (must also be in user gesture)
  pipBtn.addEventListener('click', function() {
    if (!videoReady) {
      // First tap — start the video stream
      var stream = canvas.captureStream(2);
      video.srcObject = stream;
      video.play().then(function() {
        videoReady = true;
        pipBtn.textContent = 'STEP 2: FLOAT OVER WAZE ▶';
        status.textContent = 'Video ready. Now tap again to float.';
      }).catch(function(e) {
        status.textContent = 'Video error: ' + e.message;
      });
    } else {
      // Second tap — request PiP inside user gesture
      video.requestPictureInPicture().then(function() {
        pipBtn.textContent = 'STOP FLOATING';
        status.textContent = 'Floating! Open Waze now.';
        video.addEventListener('leavepictureinpicture', function() {
          pipBtn.textContent = 'FLOAT OVER WAZE ▶';
          status.textContent = 'Tap to float again.';
          videoReady = true;
        });
        pipBtn.onclick = function() {
          document.exitPictureInPicture();
        };
      }).catch(function(e) {
        status.textContent = 'PiP error: ' + e.message;
      });
    }
  });
</script>
</body>
</html>
