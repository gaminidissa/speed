<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Speed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    height: 100vh;
    font-family: -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 40px 24px 24px 24px;
  }
  .circle {
    width: 72vw;
    height: 72vw;
    max-width: 320px;
    max-height: 320px;
    border-radius: 50%;
    background: #000;
    border: 6px solid #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .speed {
    font-size: 24vw;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }
  .unit {
    font-size: 4.5vw;
    color: #888;
    letter-spacing: 4px;
    margin-top: 4px;
  }
  #pipBtn {
    margin-top: 32px;
    padding: 16px 36px;
    background: transparent;
    border: 2px solid #fff;
    border-radius: 50px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }
  #status {
    margin-top: 16px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }
  #canvas { display: none; }
  #video  { display: none; }
</style>
</head>
<body>
  <div class="circle">
    <div class="speed" id="spd">0</div>
    <div class="unit">km/h</div>
  </div>
  <button id="pipBtn" onclick="startPiP()">FLOAT OVER WAZE ▶</button>
  <div id="status">Tap button, then switch to Waze.<br>Speed floats on top.</div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <video id="video" playsinline muted></video>

<script>
  const spdEl  = document.getElementById('spd');
  const status = document.getElementById('status');
  const pipBtn = document.getElementById('pipBtn');
  const canvas = document.getElementById('canvas');
  const video  = document.getElementById('video');
  const ctx    = canvas.getContext('2d');
  let kmh = 0;

  // GPS
  navigator.geolocation.watchPosition(
    function(p) {
      kmh = p.coords.speed ? Math.round(p.coords.speed * 3.6) : 0;
      spdEl.textContent = kmh;
    },
    function() {},
    { enableHighAccuracy: true, maximumAge: 1000 }
  );

  // Draw speed into canvas for PiP
  function draw() {
    var W = canvas.width, H = canvas.height;
    // Black background
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    // White circle
    ctx.beginPath();
    ctx.arc(W/2, H/2, W/2 - 10, 0, Math.PI * 2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 12;
    ctx.stroke();
    // Speed number
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 180px -apple-system, Helvetica Neue, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(kmh, W/2, H/2 - 20);
    // km/h label
    ctx.fillStyle = '#888';
    ctx.font = '300 40px -apple-system, Helvetica Neue, sans-serif';
    ctx.fillText('km/h', W/2, H/2 + 110);
  }

  setInterval(draw, 500);
  draw();

  // PiP
  async function startPiP() {
    try {
      var stream = canvas.captureStream(2);
      video.srcObject = stream;
      await video.play();
      await video.requestPictureInPicture();
      pipBtn.textContent = 'STOP FLOATING';
      pipBtn.onclick = function() { document.exitPictureInPicture(); };
      status.textContent = 'Floating! Open Waze now.';
      video.addEventListener('leavepictureinpicture', function() {
        pipBtn.textContent = 'FLOAT OVER WAZE ▶';
        pipBtn.onclick = startPiP;
        status.textContent = 'Tap button, then switch to Waze.';
      });
    } catch(e) {
      status.textContent = 'PiP failed: ' + e.message;
    }
  }
</script>
</body>
</html>
