<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Speed">
<title>Speed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #speed {
    font-weight: 900;
    font-size: clamp(100px, 42vw, 260px);
    line-height: 1;
    letter-spacing: -3px;
    transition: opacity 0.3s;
  }
  #unit {
    font-weight: 300;
    font-size: clamp(18px, 7vw, 40px);
    letter-spacing: 8px;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
  }
  #pipBtn {
    margin-top: 48px;
    padding: 14px 32px;
    background: transparent;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50px;
    color: rgba(255,255,255,0.7);
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 2px;
    cursor: pointer;
  }
  #pipBtn.hidden { display: none; }
  #status {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 1px;
    text-align: center;
    padding: 0 24px;
    line-height: 1.6;
  }
  #canvas { display: none; }
  #video  { display: none; }
  .gps-waiting #speed {
    opacity: 0.25;
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { opacity: 0.15; }
    50%      { opacity: 0.4; }
  }
</style>
</head>
<body class="gps-waiting" id="body">
  <div id="speed">—</div>
  <div id="unit">km/h</div>
  <button id="pipBtn" onclick="startPiP()">FLOAT OVER WAZE ▶</button>
  <div id="status">Tap above once, then open Waze.<br>Speed will float on top.</div>
  <canvas id="canvas" width="400" height="300"></canvas>
  <video id="video" playsinline muted loop></video>
<script>
  const speedEl = document.getElementById('speed');
  const body    = document.getElementById('body');
  const pipBtn  = document.getElementById('pipBtn');
  const status  = document.getElementById('status');
  const canvas  = document.getElementById('canvas');
  const video   = document.getElementById('video');
  const ctx     = canvas.getContext('2d');

  let currentKmh = 0;

  navigator.geolocation.watchPosition(
    p => {
      body.classList.remove('gps-waiting');
      currentKmh = p.coords.speed != null && p.coords.speed >= 0
        ? Math.round(p.coords.speed * 3.6) : 0;
      speedEl.textContent = currentKmh;
    },
    () => {
      body.classList.add('gps-waiting');
      speedEl.textContent = '—';
    },
    { enableHighAccuracy: true, maximumAge: 500, timeout: 15000 }
  );

  function drawCanvas() {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 180px -apple-system, Helvetica Neue, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentKmh, W / 2, H / 2 - 20);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '300 36px -apple-system, Helvetica Neue, sans-serif';
    ctx.fillText('km/h', W / 2, H / 2 + 110);
  }

  setInterval(drawCanvas, 500);
  drawCanvas();

  async function startPiP() {
    if (!document.pictureInPictureEnabled) {
      status.textContent = 'PiP not supported. Use Safari and add to Home Screen first.';
      return;
    }
    try {
      const stream = canvas.captureStream(2);
      video.srcObject = stream;
      await video.play();
      await video.requestPictureInPicture();
      pipBtn.classList.add('hidden');
      status.textContent = 'Speed is now floating! Open Waze.';
      video.addEventListener('leavepictureinpicture', () => {
        pipBtn.classList.remove('hidden');
        status.textContent = 'Tap above to float over Waze again.';
      });
    } catch (e) {
      status.textContent = 'Could not start PiP. Open in Safari and add to Home Screen.';
    }
  }
</script>
</body>
</html>
